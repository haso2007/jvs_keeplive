services:
  jvs-keeplive:
    image: python:3.11-slim
    container_name: jvs_keeplive
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./jvs_keep_alive.py:/app/jvs_keep_alive.py:ro
      - ./jvs_keep_alive.json:/app/jvs_keep_alive.json
      - ./jvs_keep_alive.log:/app/jvs_keep_alive.log
      - playwright_cache:/root/.cache/ms-playwright
    environment:
      - TZ=Asia/Shanghai
    command: >
      bash -c "
        pip install --no-cache-dir playwright &&
        playwright install --with-deps chromium &&
        python jvs_keep_alive.py
      "

volumes:
  playwright_cache:
